app = "postgres-alpine"

[build]
  dockerfile = "Dockerfile"

[env]
  POSTGRES_USER = "postgres"
  POSTGRES_DB = "postgres"

[mounts]
  source = "pg_data"
  destination = "/var/lib/postgresql/data"

[[services]]
  internal_port = 5432
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = false

  [[services.ports]]
    port = 5432
    handlers = ["pg_tls"]

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"