# fly.toml app config file generated by 'fly apps create'

app = "postgres-alpine"  # Change to your app name

[build]
image = "postgres:17-alpine"

[env]
  POSTGRES_USER = "postgres"
  POSTGRES_DB = "postgres"
  POSTGRES_PASSWORD = "${POSTGRES_PASSWORD}"

[mounts]
source = "pg_data"
destination = "/var/lib/postgresql/data"

[[services]]
internal_port = 5432
protocol = "tcp"

  [[services.ports]]
  port = 5432
  handlers = ["pg_tls"]

  [[services.tcp_checks]]
  interval = "5s"
  timeout = "2s"
  grace_period = "1s"
